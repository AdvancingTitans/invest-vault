<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投资札记无法启动</title>
    <style>
      :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #171a1f; background: #f7f8fa; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; }
      main { width: min(400px, calc(100vw - 48px)); }
      .mark { display: grid; place-items: center; width: 40px; height: 40px; border-radius: 8px; color: white; background: #2859c5; font-weight: 700; }
      h1 { margin: 20px 0 10px; font-size: 22px; }
      p { margin: 0 0 10px; color: #59616d; line-height: 1.65; }
      strong { color: #171a1f; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">记</div>
      <h1>本地数据服务未能启动</h1>
      <p>应用会自动恢复陈旧的服务锁。请先退出本窗口，再从“应用程序”文件夹重新打开“投资札记”。</p>
      <p>若仍无法启动，请在“活动监视器”中搜索“投资札记”，退出残留进程后重试。</p>
      <p><strong>您的本地持仓和笔记不会被删除。</strong></p>
    </main>
  </body>
</html>
